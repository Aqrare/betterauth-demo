services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_demo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-demo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth-demo-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_demo
      BETTER_AUTH_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-demo-network
    command: bun --watch src/index.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth-demo-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - auth-demo-network
    command: bun run dev --host 0.0.0.0

  resource-ms:
    build:
      context: ./resource-ms
      dockerfile: Dockerfile
    container_name: auth-demo-resource-ms
    ports:
      - "4001:4001"
    volumes:
      - ./resource-ms:/app
      - /app/node_modules
    environment:
      PORT: 4001
      AUTH_MS_URL: http://backend:3000
      NODE_ENV: development
    depends_on:
      - backend
    networks:
      - auth-demo-network
    command: bun --watch src/index.ts

volumes:
  postgres-data:

networks:
  auth-demo-network:
    driver: bridge
