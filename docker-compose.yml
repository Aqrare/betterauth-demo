services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_demo
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-demo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_demo
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-demo-network
    command: bun --watch src/index.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - auth-demo-network
    command: bun run dev --host 0.0.0.0

  resource-ms:
    build:
      context: ./resource-ms
      dockerfile: Dockerfile
    ports:
      - "${RESOURCE_MS_PORT:-4001}:4001"
    volumes:
      - ./resource-ms:/app
      - /app/node_modules
    environment:
      PORT: 4001
      AUTH_MS_URL: http://backend:3000
      OPA_URL: http://opa:8181
      NODE_ENV: development
    depends_on:
      - backend
    networks:
      - auth-demo-network
    command: bun --watch src/index.ts

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "${OPA_PORT:-8181}:8181"
    volumes:
      - ./opa/policies:/policies
      - ./opa/data:/data
    networks:
      - auth-demo-network
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=debug"
      - "--watch"
      - "/policies"

volumes:
  postgres-data:

networks:
  auth-demo-network:
    driver: bridge
